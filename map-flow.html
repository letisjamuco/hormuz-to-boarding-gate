<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden}#map{width:100%;height:100%}
.legend{position:absolute;left:12px;bottom:12px;z-index:500;background:rgba(255,255,255,.93);border:1px solid rgba(14,74,66,.14);border-radius:12px;padding:8px 10px;font:11px/1.35 'Space Mono',monospace;color:#1e5a51;box-shadow:0 10px 24px -18px rgba(8,44,40,.45)}
.legend span{display:inline-block;width:18px;height:6px;border-radius:99px;margin-right:6px;vertical-align:middle}.legend strong{display:block;color:#082c28;margin-bottom:4px}
</style>
</head><body>
<div id="map"></div>
<div class="legend"><strong>Origin countries through Hormuz</strong><div><span style="background:#d36a38"></span>2024 flow values (million b/d)</div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
const worldBounds=[[-85,-180],[85,180]];
const map=L.map('map',{scrollWheelZoom:true,zoomControl:true,minZoom:1,worldCopyJump:false}).setView([25,52],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:12,noWrap:true,bounds:worldBounds,attribution:'© OSM'}).addTo(map);
const hz=[26.35,56.65], orange='#d36a38';
const fM=d3.format(',.1f');
const curve=(a,b)=>[a,[(a[0]+b[0])/2 + .9,(a[1]+b[1])/2 - 1.2],b];
const weight=(v,max)=>Math.max(2,Math.sqrt(v/max)*8);
d3.csv('data/processed/hormuz_origin_flows.csv',d=>({...d,lat:+d.lat,lon:+d.lon,mbd_2024:+d.mbd_2024,share_2024:+d.share_2024||null,is_aggregate:d.is_aggregate==='yes'})).then(origins=>{
  const rows=origins.filter(d=>!d.is_aggregate && Number.isFinite(d.lat) && Number.isFinite(d.lon));
  const max=d3.max(rows,d=>d.mbd_2024)||1;
  rows.forEach(o=>{
    const ll=[o.lat,o.lon];
    L.polyline(curve(ll,hz),{color:orange,weight:weight(o.mbd_2024,max),opacity:.62,smoothFactor:2}).addTo(map)
      .bindPopup(`<strong>${o.label}</strong><br>${fM(o.mbd_2024)} million b/d through Hormuz<br><em>EIA figure data, 2024</em>`);
    L.circleMarker(ll,{radius:5,color:'#0f4d46',fillColor:orange,fillOpacity:.85,weight:1}).addTo(map)
      .bindPopup(`<strong>${o.label}</strong><br>${fM(o.mbd_2024)} million b/d`);
  });
  L.circleMarker(hz,{radius:8,color:orange,fillColor:orange,fillOpacity:.18,weight:2,dashArray:'4 4'}).addTo(map);
  L.circleMarker(hz,{radius:3,color:orange,fillColor:orange,fillOpacity:1,weight:0}).addTo(map).bindPopup('<strong>Strait of Hormuz</strong>');
});
</script>
</body></html>
